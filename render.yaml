services:
  - type: web
    name: SamDetector
    env: python
    buildCommand: |
      apt-get update && apt-get install -y gfortran libsndfile1
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
